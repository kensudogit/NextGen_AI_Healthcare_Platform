server:
  port: ${SERVER_PORT:8010}
  forward-headers-strategy: framework

spring:
  application:
    name: nghealth-platform
  datasource:
    url: ${DATABASE_JDBC_URL:jdbc:postgresql://localhost:5436/nghealth}
    username: ${DATABASE_USER:nghealth}
    password: ${DATABASE_PASSWORD:nghealth_dev}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${OAUTH2_ISSUER_URI:}

app:
  hospital-name: ${HOSPITAL_NAME:NextGen General Hospital}
  cors-origins: ${CORS_ORIGINS:http://localhost:3010}
  oauth-enabled: ${OAUTH_ENABLED:false}
  openai:
    api-key: ${OPENAI_API_KEY:}
    model: ${OPENAI_MODEL:gpt-4o-mini}
  aws:
    region: ${AWS_REGION:ap-northeast-1}
    s3-bucket: ${AWS_S3_BUCKET:nghealth-dicom}
    endpoint: ${AWS_ENDPOINT:}
    access-key: ${AWS_ACCESS_KEY_ID:}
    secret-key: ${AWS_SECRET_ACCESS_KEY:}
  storage:
    local-path: ${DICOM_LOCAL_PATH:storage/dicom}
    use-s3: ${STORAGE_USE_S3:false}
  fhir:
    base-url: ${FHIR_BASE_URL:http://localhost:8010/fhir/R4}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.nghealth: INFO
